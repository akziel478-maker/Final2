<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Hub - Latest News</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">Vi En Ẹt Brét</div>
            <div class="nav-links">
                <button id="logoutBtn" class="btn btn-logout">Đăng xuất</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <h1>Latest News</h1>
            <div class="search-section">
                <input type="text" id="searchInput" placeholder="Search news">
                <select id="categorySelect" class="category-select">
                    <option value="general">General</option>
                    <option value="business">Business</option>
                    <option value="entertainment">Entertainment</option>
                    <option value="health">Health</option>
                    <option value="science">Science</option>
                    <option value="sports">Sports</option>
                    <option value="technology">Technology</option>
                </select>
                <button id="searchBtn" class="btn btn-primary">Search</button>
            </div>
        </div>

        <div class="content-wrapper">
            <div class="main-content">
                <div id="newsContainer" class="news-grid">
                    <!-- News articles will be loaded here -->
                </div>

                <div class="loading" id="loading" style="display: none;">
                    <p>Loading news...</p>
                </div>
            </div>

            <aside class="sidebar">
                <h3>Featured Products</h3>
                <div id="productsContainer" class="products-list">
                    <!-- Products will load here -->
                </div>
            </aside>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
